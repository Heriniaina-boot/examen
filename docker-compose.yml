version: "3.9"

networks:
  app-network:
    driver: bridge

volumes:
  jenkins_home:
  mongo-data:
  trivy-cache:
  trivy-reports:

services:

  # ─────────────────────────────────────────
  # Jenkins CI/CD
  # ─────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────
  # Application Node.js
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: gestion-voitures-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/gestion_voitures
      PORT: 3000
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # ─────────────────────────────────────────
  # Base de données MongoDB
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7.0-jammy
    container_name: gestion-voitures-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    environment:
      MONGO_INITDB_DATABASE: gestion_voitures
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────
  # Trivy - Scan image Docker
  # ─────────────────────────────────────────
  trivy:
    image: aquasec/trivy:latest
    container_name: trivy-image-scanner
    restart: no
    volumes:
      - trivy-cache:/root/.cache/trivy
      - trivy-reports:/reports
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    command: >
      image
      --exit-code 0
      --severity LOW,MEDIUM,CRITICAL
      --format template
      --template "@contrib/csv.tpl"
      --output /reports/trivy-image-report.csv
      --cache-dir /root/.cache/trivy
      gestion-voitures-app
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - security

  # ─────────────────────────────────────────
  # Trivy - Scan code source
  # ─────────────────────────────────────────
  trivy-fs:
    image: aquasec/trivy:latest
    container_name: trivy-fs-scanner
    restart: no
    volumes:
      - trivy-cache:/root/.cache/trivy
      - trivy-reports:/reports
      - .:/workspace:ro
    networks:
      - app-network
    command: >
      fs
      --exit-code 0
      --severity LOW,MEDIUM,CRITICAL
      --format template
      --template "@contrib/csv.tpl"
      --output /reports/trivy-fs-report.csv
      --cache-dir /root/.cache/trivy
      /workspace
    profiles:
      - security
